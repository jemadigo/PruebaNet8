name: Build SelfContained Net8

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish self-contained exe
      run: dotnet publish ./src/PruebaNet8.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PruebaNet8-exe
        path: src/bin/Release/net8.0/win-x64/publish/
